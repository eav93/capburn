name: CI

# Проверки на каждый push в main и каждый PR: линт Rust, сборка обучалки и
# PHP-расширения, smoke-тест загрузки расширения в PHP.

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'LICENSE', '.gitignore']
  pull_request:
    paths-ignore: ['**.md', 'LICENSE', '.gitignore']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Rust lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # php-config нужен build-скрипту ext-php-rs при сборке capburn-php.
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    name: Build · ${{ matrix.platform.name }} · php ${{ matrix.php }}
    needs: lint
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.5']
        platform:
          - { name: linux-x86_64, runner: ubuntu-latest }
          - { name: macos-aarch64, runner: macos-14 }
    steps:
      - uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ matrix.platform.name }}-php${{ matrix.php }}

      - name: Build trainer (capburn)
        run: cargo build --release -p capburn-train

      - name: Build PHP extension (capburn_php)
        run: cargo build --release -p capburn_php

      - name: Smoke test — extension loads
        run: |
          SRC=$(find target/release -maxdepth 1 \( -name 'libcapburn_php.dylib' -o -name 'libcapburn_php.so' \) | head -n1)
          test -n "$SRC" || { echo "артефакт расширения не найден"; exit 1; }
          php -d extension="$PWD/$SRC" -r 'exit(class_exists("Capburn\\Ext\\Recognizer") ? 0 : 1);'
          echo "Расширение загружается, класс зарегистрирован."
